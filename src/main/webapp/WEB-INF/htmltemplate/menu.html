<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/destyle.css">
<link rel="stylesheet" href="css/sporder.css?202508131752">
<link rel="stylesheet" href="css/menu.css?202508131752">
<script src="js/menu.js?202604291750"></script>
<title>スマホオーダー</title>
</head>
<body data-order-group-id="">
<!-- 上部カテゴリ -->
<div id="category-bar">
  <div class="category active">ドリンク</div>
  <div class="category">はやい</div>
  <div class="category">揚げもの</div>
  <div class="category">焼きもの</div>
  <div class="category">おつまみ</div>
  <div class="category">ごはん</div>
  <div class="category">デザート</div>
</div>

<!-- 商品一覧 -->
<div id="menu-list">
  <div class="subcategory">アルコール</div>
  <div class="menu-item">
    <img class="menu-thumbnail" src="https://via.placeholder.com/100">
    <div class="menu-info">
      <div class="menu-name">生ビール</div>
      <div class="menu-price">¥550</div>
    </div>
  </div>
  <div class="menu-item">
    <img class="menu-thumbnail" src="https://via.placeholder.com/100">
    <div class="menu-info">
      <div class="menu-name">日本酒</div>
      <div class="menu-price">¥680</div>
    </div>
  </div>
  <div class="menu-item">
    <img class="menu-thumbnail" src="https://via.placeholder.com/100">
    <div class="menu-info">
      <div class="menu-name">ハイボール</div>
      <div class="menu-price">¥680</div>
    </div>
  </div>
  <div class="subcategory">ソフトドリンク</div>
  <div class="menu-item">
    <img class="menu-thumbnail" src="https://via.placeholder.com/100">
    <div class="menu-info">
      <div class="menu-name">ウーロン茶</div>
      <div class="menu-price">¥680</div>
    </div>
  </div>
  <div class="menu-item">
    <img class="menu-thumbnail" src="https://via.placeholder.com/100">
    <div class="menu-info">
      <div class="menu-name">コーラ</div>
      <div class="menu-price">¥680</div>
    </div>
  </div>
</div>

<!-- 注文ダイアログ -->
<dialog id="order-dialog">
  <form method="dialog" class="order-dialog-form">
    <div class="order-dialog-body">
      <div class="order-dialog-image-wrap">
        <img class="order-dialog-image" src="https://via.placeholder.com/320x240" alt="ワイルドターキー">
      </div>
      <div class="order-dialog-info">
        <div class="order-dialog-name">ワイルドターキー</div>
        <div class="order-dialog-price">¥800</div>
        <label class="order-field">
          <span class="order-field-label">注文数</span>
          <span class="order-count-control">
            <button type="button" class="order-count-button decrease">−</button>
            <input class="order-count" type="number" name="count" value="1" min="1" step="1" readonly>
            <button type="button" class="order-count-button increase">＋</button>
          </span>
        </label>
        <label class="order-field order-option-field">
          <span class="order-field-label">飲み方</span>
          <select class="order-option" name="option">
            <option value="mizuwari">水割り</option>
            <option value="rock">ロック</option>
            <option value="straight">ストレート</option>
          </select>
        </label>
      </div>
    </div>
    <div class="order-dialog-actions">
      <button type="button" class="order-dialog-button primary add-to-order-button">注文に追加</button>
      <button type="submit" class="order-dialog-button secondary">キャンセル</button>
    </div>
  </form>
</dialog>

<!-- 注文確認ダイアログ -->
<dialog id="order-confirm-dialog">
  <div class="order-confirm-content">
    <div class="order-confirm-message">注文しますか?</div>
    <div class="order-confirm-actions">
      <button type="button" class="order-confirm-button primary confirm-order-button">注文する</button>
      <button type="button" class="order-confirm-button secondary continue-selection-button">選択を続ける</button>
    </div>
  </div>
</dialog>

<!-- 下部ナビ -->
<div class="bottom-nav">
  <div class="nav-item">店員呼出</div>
  <a class="nav-item" href="orderlist.html">注文内容</a>
  <a class="nav-item" href="orderhistory.html">注文履歴</a>
  <div class="nav-item">お会計</div>
</div>

</body>
</html>
